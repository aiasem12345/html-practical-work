<H1>Classification of computer viruses</H1>
<HR>

<P>Computer viruses can be classified by:</P>

<H2>By target:</H2>
<OL>
<LI>Boot sector viruses</LI>
<LI>File viruses</LI>
<LI>Macro viruses</LI>
<LI>Script viruses</LI>
</OL>

<H2>By concealment:</H2>
<UL>
<LI>Stealth viruses</LI>
<LI>Polymorphic viruses</LI>
<LI>Metamorphic viruses</LI>
</UL>
